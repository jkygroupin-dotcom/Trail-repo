<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARIA To-Do App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      width: 420px;
      box-shadow: 0 0 60px rgba(100, 80, 255, 0.3);
    }

    h1 {
      color: #fff;
      font-size: 26px;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    h1 span {
      color: #a78bfa;
    }

    .subtitle {
      color: #9ca3af;
      font-size: 13px;
      margin-bottom: 28px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border 0.3s;
    }

    input::placeholder {
      color: #6b7280;
    }

    input:focus {
      border-color: #a78bfa;
    }

    button.add-btn {
      padding: 12px 18px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    button.add-btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 12px;
      color: #6b7280;
    }

    .stats span {
      color: #a78bfa;
      font-weight: bold;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 320px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .todo-list::-webkit-scrollbar {
      width: 4px;
    }

    .todo-list::-webkit-scrollbar-thumb {
      background: #7c3aed;
      border-radius: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 16px;
      transition: all 0.3s;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover {
      border-color: rgba(167, 139, 250, 0.3);
      background: rgba(255,255,255,0.08);
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #4b5563;
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #7c3aed;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .todo-item.done .check-btn {
      background: #7c3aed;
      border-color: #7c3aed;
    }

    .todo-text {
      flex: 1;
      color: #e5e7eb;
      font-size: 14px;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #4b5563;
      font-size: 16px;
      cursor: pointer;
      transition: color 0.2s;
      padding: 2px 6px;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    .empty-state {
      text-align: center;
      color: #4b5563;
      padding: 30px 0;
      font-size: 14px;
    }

    .empty-state .icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      color: #ef4444;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      background: rgba(239, 68, 68, 0.1);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>ARIA <span>Tasks</span> ✦</h1>
  <p class="subtitle">Powered by ARIA PRIME • AGI Task Engine</p>

  <div class="input-area">
    <input
      type="text"
      id="taskInput"
      placeholder="Koi bhi task likho..."
      onkeydown="handleKey(event)"
    />
    <button class="add-btn" onclick="addTask()">+</button>
  </div>

  <div class="stats">
    <div>Total: <span id="totalCount">0</span> tasks</div>
    <div>Completed: <span id="doneCount">0</span></div>
  </div>

  <div class="todo-list" id="todoList">
    <div class="empty-state">
      <div class="icon">🚀</div>
      <div>Koi task nahi hai abhi...<br/>Kuch add karo!</div>
    </div>
  </div>

  <button class="clear-btn" onclick="clearDone()">🗑️ Clear Completed Tasks</button>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('ariaTasks')) || [];

  function saveTasks() {
    localStorage.setItem('ariaTasks', JSON.stringify(tasks));
  }

  function handleKey(e) {
    if (e.key === 'Enter') addTask();
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;

    tasks.unshift({ id: Date.now(), text, done: false });
    input.value = '';
    saveTasks();
    render();
  }

  function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
    saveTasks();
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    saveTasks();
    render();
  }

  function render() {
    const list = document.getElementById('todoList');
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;

    document.getElementById('totalCount').textContent = total;
    document.getElementById('doneCount').textContent = done;

    if (total === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="icon">🚀</div>
          <div>Koi task nahi hai abhi...<br/>Kuch add karo!</div>
        </div>`;
      return;
    }

    list.innerHTML = tasks.map(task => `
      <div class="todo-item ${task.done ? 'done' : ''}">
        <button class="check-btn" onclick="toggleTask(${task.id})">
          ${task.done ? '✓' : ''}
        </button>
        <span class="todo-text">${task.text}</span>
        <button class="delete-btn" onclick="deleteTask(${task.id})">✕</button>
      </div>
    `).join('');
  }

  // Initial render
  render();
</script>

</body>
</html>
